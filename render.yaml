# render.yaml — Render Blueprint for ICEMGS
# Docs: https://docs.render.com/blueprint-spec

services:
  # Django Backend API
  - type: web
    name: icemgs-backend
    runtime: python
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: |
      python create_admin.py
      gunicorn icemgs_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DB_NAME
        fromDatabase:
          name: icemgs-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: icemgs-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: icemgs-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: icemgs-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: icemgs-db
          property: port
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  # React Frontend (Static Site)
  - type: web
    name: icemgs-frontend
    runtime: static
    buildCommand: pnpm install && pnpm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false

databases:
  - name: icemgs-db
    plan: free
    databaseName: icemgs_db
